[tool.poetry]
name = "indexify"
version = "0.2.48"
description = "Helper package with all Indexify components"
authors = ["Tensorlake Inc. <support@tensorlake.ai>"]
license = "Apache 2.0"
readme = "README.md"
homepage = "https://github.com/tensorlakeai/indexify"
repository = "https://github.com/tensorlakeai/indexify"
packages = [
    { include = "cli", from="src" },
]

[tool.poetry.scripts]
indexify-cli = "cli.cli:app"

[tool.poetry.dependencies]
python = "^3.9"
rich = "^13.9.2"
typer = "^0.12"
nanoid = "^2.0.0"
structlog = "^24.4.0"
indexify-python-utils = { path = "../python_utils", develop = true }
indexify-executor = { path = "../executor", develop = true }

[tool.poetry.dev-dependencies]
black = "^24.10.0"
pylint = "^2.4.0"

[build-system]
requires = ["poetry>=1.2"]
build-backend = "poetry.core.masonry.api"
