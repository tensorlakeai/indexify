name: Tests

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'crates/**'
      - 'indexify/**'
      - 'tensorlake'
      - '.github/workflows/tests.yaml'

env:
  CARGO_TERM_COLOR: always

jobs:
  lint_server:
    name: Lint Indexify Server
    runs-on: ubuntu-latest
    steps:
      - name: Install protobuf and musl tools
        run: sudo apt update && sudo apt install -y protobuf-compiler musl-tools
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-directories: |
            target
      - name: Install musl target for static daemon binary
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install Just
        uses: extractions/setup-just@v3
      - name: Check formatting of indexify-server
        run: just check-rust
      - name: Check linting of indexify-server
        run: just lint-rust

  build_server:
    name: Build Indexify Server
    runs-on: namespace-profile-indexify-builder
    permissions:
      contents: read
    steps:
      - name: Install protobuf and musl tools
        run: sudo apt update && sudo apt install -y protobuf-compiler musl-tools
      - uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: |
            target
      - name: Install musl target for static daemon binary
        run: rustup target add x86_64-unknown-linux-musl
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install Just
        uses: extractions/setup-just@v3
      - name: Build indexify-server
        run: just build-rust
      - name: Test indexify-server
        run: just test-rust

  lint_python_packages:
    name: Lint Python packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install poetry
        run: pipx install --force 'poetry==2.0.0'
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'poetry'
      - name: Build and lint indexify
        run: cd indexify && make build && make check
